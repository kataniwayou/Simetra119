receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  transform:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["host_name"], resource.attributes["service.instance.id"])

exporters:
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [transform]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      exporters: [debug]
