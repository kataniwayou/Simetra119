# =============================================================================
# Grafana Visualization UI -- Deployment
# =============================================================================
# Provides the Grafana dashboard UI for operators to view Simetra metrics.
#
# NodePort service already exists in service-nodeports.yaml (30030/TCP).
# Operator accesses Grafana at http://<minikube-ip>:30030.
#
# Prometheus datasource is auto-provisioned on startup via ConfigMap defined
# in grafana-provisioning.yaml. Dashboards are managed manually via Grafana UI
# (import JSON from deploy/grafana/dashboards/).
#
# Setup:
#   1. kubectl apply -f deploy/k8s/production/grafana-provisioning.yaml
#   2. kubectl apply -f deploy/k8s/production/grafana.yaml
#   3. Import dashboards via Grafana UI: Dashboards > Import > Upload JSON
#
# Default credentials: admin / admin (Grafana built-in default).
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: simetra
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        supplementalGroups:
        - 0
      containers:
      - name: grafana
        image: grafana/grafana:11.6.11
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /robots.txt
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 2
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
