apiVersion: v1
kind: ConfigMap
metadata:
  name: simetra-devices
  namespace: simetra
data:
  # ============================================================================
  # DEVICE DEFINITIONS
  # ============================================================================
  #
  # Bare JSON array of device objects. DeviceWatcherService watches this
  # ConfigMap for live reload without affecting OID map.
  #
  # Each device entry requires:
  #   Name          - Human-readable device name (e.g., "npb-2e-01", "obp-link-03")
  #   IpAddress     - Device IP address on the production LAN (e.g., "10.0.1.100")
  #   Port          - SNMP port (default: 161)
  #   CommunityString - Optional override; null falls back to Simetra.{Name} convention
  #   MetricPolls   - Array of SNMP poll definitions for this device
  #
  # Each MetricPoll entry:
  #   Oids            - Flat string array of OID strings (e.g., ["1.3.6.1.2.1.1.3.0"])
  #   IntervalSeconds - Poll interval in seconds
  #
  # ============================================================================
