apiVersion: v1
kind: ConfigMap
metadata:
  name: simetra-devices
  namespace: simetra
data:
  # ============================================================================
  # DEVICE DEFINITIONS
  # ============================================================================
  #
  # Bare JSON array of device objects. DeviceWatcherService watches this
  # ConfigMap for live reload without affecting OID map.
  #
  # Each device entry requires:
  #   Name        - Human-readable device name (e.g., "npb-2e-01", "obp-link-03")
  #   IpAddress   - Device IP address on the production LAN (e.g., "10.0.1.100")
  #   MetricPolls - Array of SNMP poll definitions for this device
  #
  # See simetra-config ConfigMap comments for MetricPoll field documentation.
  #
  # ============================================================================
  devices.json: |
    [
      {
        "Name": "REPLACE_ME_DEVICE_1_NAME",
        "IpAddress": "REPLACE_ME_DEVICE_1_IP",
        "DeviceType": "NPB",
        "MetricPolls": [
          {
            "MetricName": "port_rx_octets",
            "MetricType": "Counter",
            "Oids": [
              {
                "Oid": "1.3.6.1.4.1.47477.100.4.2.2.5.1.1.3.1.0",
                "PropertyName": "port_rx_octets",
                "Role": "Metric"
              }
            ],
            "IntervalSeconds": 30,
            "StaticLabels": {
              "port_number": "1"
            }
          }
        ]
      }
    ]
