apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-collector-config
  namespace: simetra
data:
  # ============================================================================
  # PRODUCTION CONFIGURATION TEMPLATE
  # ============================================================================
  #
  # Replace ALL "REPLACE_ME_*" values below before applying this ConfigMap.
  # The JSON block cannot contain comments, so all field documentation is here.
  #
  # --- DEFAULTS (change only if needed) ---
  #
  # PodIdentity
  #   Auto-populated from HOSTNAME env var (K8s pod name) via PostConfigure.
  #   No manual configuration needed. Leave the section empty.
  #
  # Otlp.Endpoint                 - "http://otel-collector:4317"
  #                                 Internal cluster DNS for the OTel Collector.
  #                                 Do not change unless you renamed the OTel service.
  #
  # Otlp.ServiceName              - "snmp-collector"
  #                                 Service name in OTLP telemetry. No need to change.
  #
  # SnmpListener.BindAddress      - "0.0.0.0"
  #                                 Listens on all interfaces. Do not change.
  #
  # SnmpListener.Port             - 10162
  #                                 UDP port for SNMP trap reception inside the pod.
  #                                 Must match the container port in deployment.yaml.
  #
  # SnmpListener.Version          - "v2c"
  #                                 Only v2c is supported. Do not change.
  #
  # Lease.Name                    - "snmp-collector-leader"
  #                                 K8s Lease object name for leader election.
  #
  # Lease.Namespace               - "simetra"
  #                                 Namespace where the Lease object lives.
  #
  # Lease.DurationSeconds         - 15
  #                                 Lease TTL. Followers acquire after expiry.
  #
  # Lease.RenewIntervalSeconds    - 10
  #                                 How often the leader renews the lease.
  #
  # HeartbeatJob.IntervalSeconds  - 15
  #                                 How often each pod emits a heartbeat (seconds).
  #                                 Lower = faster failover detection, more overhead.
  #
  # Heartbeat                       - HeartbeatJob sends a loopback trap every 15s.
  #                                 No OidMap entry needed — heartbeat is internal
  #                                 infrastructure. Pipeline metrics (snmp.event.handled)
  #                                 prove it's alive. No snmp_gauge is exported.
  #
  # CorrelationJob.IntervalSeconds - 30
  #                                 How often the leader correlates device liveness
  #                                 with trap/poll activity (seconds).
  #
  # Liveness.GraceMultiplier      - 2.0
  #                                 A device is stale after
  #                                 (HeartbeatInterval * GraceMultiplier) seconds
  #                                 without activity. Higher = more tolerant.
  #
  # Channels.BoundedCapacity      - 100
  #                                 Max items in internal message channels before
  #                                 backpressure is applied. Increase if you see
  #                                 channel-full warnings in logs.
  #
  # Logging.EnableConsole         - true
  #                                 Enables structured console log output.
  #                                 Keep true for kubectl logs visibility.
  #
  # ============================================================================
  appsettings.k8s.json: |
    {
      "PodIdentity": {},
      "Otlp": {
        "Endpoint": "http://otel-collector:4317",
        "ServiceName": "snmp-collector"
      },
      "SnmpListener": {
        "BindAddress": "0.0.0.0",
        "Port": 10162,
        "Version": "v2c"
      },
      "Lease": {
        "Name": "snmp-collector-leader",
        "Namespace": "simetra",
        "DurationSeconds": 15,
        "RenewIntervalSeconds": 10
      },
      "HeartbeatJob": {
        "IntervalSeconds": 15
      },
      "CorrelationJob": {
        "IntervalSeconds": 30
      },
      "Liveness": {
        "GraceMultiplier": 2.0
      },
      "Channels": {
        "BoundedCapacity": 100
      },
      "Logging": {
        "EnableConsole": true
      }
    }
---
