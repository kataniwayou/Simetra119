apiVersion: v1
kind: ConfigMap
metadata:
  name: simetra-devices
  namespace: simetra
data:
  # ============================================================================
  # DEVICE DEFINITIONS
  # ============================================================================
  #
  # Bare JSON array of device objects. DeviceWatcherService watches this
  # ConfigMap for live reload without affecting OID map.
  #
  # Each device entry requires:
  #   CommunityString - Full SNMP community string (e.g., "Simetra.npb-2e-01"). Device name derived from this.
  #   IpAddress       - Device IP address on the production LAN (e.g., "10.0.1.100")
  #   Port            - SNMP port (default: 161)
  #   Polls           - Array of SNMP poll definitions for this device
  #
  # Each Poll entry:
  #   Metrics         - Array of metric objects with MetricName (resolved to OIDs at load time via oidmaps)
  #   IntervalSeconds - Poll interval in seconds
  #
  # ============================================================================
  devices.json: |
    [
      {
        "CommunityString": "Simetra.OBP-01",
        "IpAddress": "obp-simulator.simetra.svc.cluster.local",
        "Port": 161,
        "Polls": [
          {
            "IntervalSeconds": 10,
            "GraceMultiplier": 2.0,
            "Metrics": [
              {"MetricName": "obp_channel_L1"},
              {"MetricName": "obp_r1_power_L1"},
              {"MetricName": "obp_r2_power_L1"},
              {"MetricName": "obp_r3_power_L1"},
              {"MetricName": "obp_r4_power_L1"},
              {"MetricName": "obp_link_state_L2"},
              {"MetricName": "obp_channel_L2"},
              {"MetricName": "obp_r1_power_L2"},
              {"MetricName": "obp_r2_power_L2"},
              {"MetricName": "obp_r3_power_L2"},
              {"MetricName": "obp_r4_power_L2"},
              {"MetricName": "obp_link_state_L3"},
              {"MetricName": "obp_channel_L3"},
              {"MetricName": "obp_r1_power_L3"},
              {"MetricName": "obp_r2_power_L3"},
              {"MetricName": "obp_r3_power_L3"},
              {"MetricName": "obp_r4_power_L3"},
              {"MetricName": "obp_link_state_L4"},
              {"MetricName": "obp_channel_L4"},
              {"MetricName": "obp_r1_power_L4"},
              {"MetricName": "obp_r2_power_L4"},
              {"MetricName": "obp_r3_power_L4"},
              {"MetricName": "obp_r4_power_L4"}
            ]
          },
          {
            "IntervalSeconds": 10,
            "GraceMultiplier": 2.0,
            "Metrics": [
              {"MetricName": "obp_r1_power_L1"},
              {"MetricName": "obp_r2_power_L1"},
              {"MetricName": "obp_r3_power_L1"},
              {"MetricName": "obp_r4_power_L1"}
            ],
            "AggregatedMetricName": "obp_mean_power_L1",
            "Aggregator": "mean"
          },
          {
            "IntervalSeconds": 30,
            "GraceMultiplier": 2.0,
            "Metrics": [
              {"MetricName": "obp_link_state_L1"}
            ]
          },
          {
            "IntervalSeconds": 60,
            "GraceMultiplier": 2.0,
            "Metrics": [
              {"MetricName": "obp_device_type"},
              {"MetricName": "obp_sw_version"},
              {"MetricName": "obp_serial"}
