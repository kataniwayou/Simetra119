# Production Prometheus - ConfigMap + Deployment + Service
# Changes from dev:
#   - imagePullPolicy: IfNotPresent for air-gapped operation
#   - args with --config.file and --storage.tsdb.retention.time=30d
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: simetra
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      # NOTE: otel-collector:8889 is a dead target -- OTel Collector uses
      # prometheusremotewrite exporter (push), not prometheus exporter (scrape).
      # Metrics arrive via remote write to /api/v1/write instead.
      - job_name: "otel-collector"
        honor_labels: true
        static_configs:
          - targets: ["otel-collector:8889"]
        metric_relabel_configs:
          - regex: "job"
            action: labeldrop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: simetra
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v3.2.1
        imagePullPolicy: IfNotPresent
        # IMPORTANT: args overrides the container's CMD. Both --config.file and
        # --storage.tsdb.retention.time must be specified. Removing --config.file
        # will cause Prometheus to fail to start.
        args:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.retention.time=30d"
          - "--web.enable-remote-write-receiver"
        ports:
        - containerPort: 9090
          name: http
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: simetra
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
  - name: http
    port: 9090
    targetPort: http
