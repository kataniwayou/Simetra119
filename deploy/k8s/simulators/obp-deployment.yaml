apiVersion: apps/v1
kind: Deployment
metadata:
  name: obp-simulator
  namespace: simetra
  labels:
    app: obp-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obp-simulator
  template:
    metadata:
      labels:
        app: obp-simulator
    spec:
      containers:
      - name: obp-simulator
        image: obp-simulator:local
        imagePullPolicy: Never
        ports:
        - containerPort: 161
          name: snmp
          protocol: UDP
        env:
        - name: DEVICE_NAME
          value: "OBP-01"
        - name: TRAP_TARGET
          value: "simetra-pods.simetra.svc.cluster.local"
        - name: TRAP_PORT
          value: "10162"
        - name: TRAP_INTERVAL_MIN
          value: "60"
        - name: TRAP_INTERVAL_MAX
          value: "300"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - |
              import sys
              from pysnmp.hlapi.v3arch.asyncio import *
              import asyncio

              async def check():
                  engine = SnmpEngine()
                  errorIndication, errorStatus, errorIndex, varBinds = await get_cmd(
                      engine,
                      CommunityData('Simetra.OBP-01'),
                      await UdpTransportTarget.create(('127.0.0.1', 161), timeout=3, retries=0),
                      ContextData(),
                      ObjectType(ObjectIdentity('1.3.6.1.4.1.47477.10.21.1.3.1.0'))
                  )
                  engine.close_dispatcher()
                  sys.exit(1 if errorIndication else 0)

              asyncio.run(check())
          initialDelaySeconds: 20
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - |
              import sys
              from pysnmp.hlapi.v3arch.asyncio import *
              import asyncio

              async def check():
                  engine = SnmpEngine()
                  errorIndication, errorStatus, errorIndex, varBinds = await get_cmd(
                      engine,
                      CommunityData('Simetra.OBP-01'),
                      await UdpTransportTarget.create(('127.0.0.1', 161), timeout=3, retries=0),
                      ContextData(),
                      ObjectType(ObjectIdentity('1.3.6.1.4.1.47477.10.21.1.3.1.0'))
                  )
                  engine.close_dispatcher()
                  sys.exit(1 if errorIndication else 0)

              asyncio.run(check())
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: obp-simulator
  namespace: simetra
  labels:
    app: obp-simulator
spec:
  selector:
    app: obp-simulator
  ports:
  - name: snmp
    port: 161
    targetPort: snmp
    protocol: UDP
